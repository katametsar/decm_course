version: 2

sources:
  - name: raw
    description: Raw Airviro measurements loaded by the Python ETL.
    schema: raw
    tables:
      - name: airviro_measurement
        description: Long-form measurements keyed by source, station, timestamp, and indicator.
        columns:
          - name: source_type
            tests:
              - not_null
          - name: station_id
            tests:
              - not_null
          - name: observed_at
            tests:
              - not_null
          - name: indicator_code
            tests:
              - not_null
          - name: source_row_hash
            tests:
              - not_null

